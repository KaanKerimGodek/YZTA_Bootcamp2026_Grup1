name: vazgectim
description: "Vazgeçtim — Positive gain through intentional omission. Bir finansal wellness uygulaması."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0+1

  # Config / env
  flutter_dotenv: ^5.1.0

  # Backend (optional direct access)
  supabase_flutter: ^2.6.0

  # Formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Utils
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
